<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - HydroGuard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="background: #F8FAFC;">
    <nav class="navbar" style="padding: 1.5rem 5rem; background: white; border-bottom: 1px solid #E2E8F0;">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <i data-lucide="droplets" class="text-primary" style="width: 32px; height: 32px;"></i>
            <span style="font-size: 1.75rem; font-weight: 800; color: #0F172A; letter-spacing: -1px;">HydroGuard</span>
        </div>
        <div style="display: flex; gap: 2rem; align-items: center;">
            <a href="profile.html" class="nav-link" style="color: #64748B; text-decoration: none; font-weight: 600;">Return to Profile</a>
            <a href="index.html" class="btn btn-primary" style="background: #0F172A; border-radius: 12px; padding: 0.75rem 1.5rem;"><i data-lucide="log-out"
                    style="width: 18px; margin-right: 8px;"></i> Logout</a>
        </div>
    </nav>

    <div class="container" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 120px); padding: 2rem;">
        <div class="card" style="max-width: 480px; padding: 4rem 3.5rem; background: white; border-radius: 32px; box-shadow: 0 40px 100px rgba(0,0,0,0.03); border: 1px solid #E2E8F0;">
            <header style="text-align: center; margin-bottom: 3.5rem;">
                <div style="background: #F1F5F9; color: #0F172A; width: 80px; height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem;">
                    <i data-lucide="lock" style="width: 40px; height: 40px;"></i>
                </div>
                <h2 style="font-size: 2rem; font-weight: 950; color: #0F172A; margin: 0;">Change Password</h2>
                <p style="color: #64748B; font-weight: 600; margin-top: 10px; font-size: 1.1rem;">Update your account security credentials.</p>
            </header>

            <form id="changePasswordForm">
                <div class="mb-6">
                    <label style="display: block; font-size: 0.85rem; font-weight: 800; color: #475569; margin-bottom: 0.75rem;">CURRENT PASSWORD</label>
                    <div style="position: relative;">
                        <input type="password" id="currentPassword" placeholder="Enter current password" required
                            style="width: 100%; padding: 1.1rem 1.25rem; border: 1.5px solid #E2E8F0; border-radius: 14px; font-weight: 600; font-family: inherit;">
                        <i data-lucide="eye" class="toggle"
                            style="position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%); width: 20px; color: #94A3B8; cursor: pointer;"></i>
                    </div>
                </div>

                <div class="mb-6">
                    <label style="display: block; font-size: 0.85rem; font-weight: 800; color: #475569; margin-bottom: 0.75rem;">NEW PASSWORD</label>
                    <div style="position: relative;">
                        <input type="password" id="newPassword" placeholder="Min. 8 characters" required
                            style="width: 100%; padding: 1.1rem 1.25rem; border: 1.5px solid #E2E8F0; border-radius: 14px; font-weight: 600; font-family: inherit;">
                        <i data-lucide="eye" class="toggle"
                            style="position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%); width: 20px; color: #94A3B8; cursor: pointer;"></i>
                    </div>
                </div>

                <div class="mb-10">
                    <label style="display: block; font-size: 0.85rem; font-weight: 800; color: #475569; margin-bottom: 0.75rem;">CONFIRM NEW PASSWORD</label>
                    <div style="position: relative;">
                        <input type="password" id="confirmNewPassword" placeholder="Repeat new password" required
                            style="width: 100%; padding: 1.1rem 1.25rem; border: 1.5px solid #E2E8F0; border-radius: 14px; font-weight: 600; font-family: inherit;">
                        <i data-lucide="eye" class="toggle"
                            style="position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%); width: 20px; color: #94A3B8; cursor: pointer;"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.25rem; background: #0F172A; border-radius: 16px; font-weight: 900; font-size: 1.1rem; border: none; cursor: pointer; color: white;">
                    Update Password
                </button>
            </form>

            <div style="margin-top: 2.5rem; text-align: center;">
                <a href="profile.html" style="color: #64748B; font-size: 0.95rem; text-decoration: none; font-weight: 700;">Cancel and Return</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setupPasswordToggles();
        });

        function setupPasswordToggles() {
            document.querySelectorAll('.toggle').forEach(icon => {
                icon.addEventListener('click', function () {
                    const input = this.parentElement.querySelector('input');
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.setAttribute('data-lucide', 'eye-off');
                    } else {
                        input.type = 'password';
                        this.setAttribute('data-lucide', 'eye');
                    }
                    lucide.createIcons();
                });
            });
        }

        document.getElementById('changePasswordForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const npwd = document.getElementById('newPassword').value;
            const cpwd = document.getElementById('confirmNewPassword').value;

            if (npwd !== cpwd) {
                hg.ui.showToast('Passwords do not match', 'error');
                return;
            }

            hg.ui.showToast('Updating security credentials...', 'info');

            setTimeout(() => {
                hg.ui.showToast('Password updated successfully', 'success');
                setTimeout(() => {
                    location.href = 'profile.html';
                }, 1000);
            }, 1500);
        });
    </script>
</body>

</html>
