<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Recovery - HydroGuard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);">
    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <i data-lucide="droplets" class="text-primary" style="width: 32px; height: 32px;"></i>
            <span style="font-size: 1.5rem; font-weight: 700; color: var(--secondary-color);">HydroGuard</span>
        </div>
        <div class="nav-link-group">
            <a href="index.html" class="nav-link">Main Portal</a>
        </div>
        <a href="create-account.html" class="btn btn-primary" style="background: var(--bg-dark);"><i
                data-lucide="user-plus" style="width: 18px; margin-right: 8px;"></i> Sign Up</a>
    </nav>

    <div class="container"
        style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 100px);">
        <div class="card glass text-center" style="max-width: 450px; padding: 4rem 3rem;">
            <div
                style="background: var(--bg-dark); color: white; width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 2.5rem; transform: rotate(-5deg);">
                <i data-lucide="key-round" style="width: 40px; height: 40px; transform: rotate(5deg);"></i>
            </div>

            <h2 style="font-size: 2rem; font-weight: 900; color: var(--secondary-color); margin-bottom: 1rem;">Lost
                Access?</h2>
            <p style="color: var(--text-gray); font-weight: 500; line-height: 1.6; margin-bottom: 3rem;">Enter the
                administrative or citizen email associated with your identity. We will transmit an encrypted recovery
                token.</p>

            <form id="forgotForm">
                <div class="mb-6 text-left">
                    <label
                        style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-gray); text-transform: uppercase; margin-bottom: 0.75rem; letter-spacing: 0.05em;">Authorized
                        Email</label>
                    <div style="position: relative;">
                        <i data-lucide="mail"
                            style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 18px; color: #94A3B8;"></i>
                        <input type="email" id="email" placeholder="john.doe@gov.in" required
                            style="width: 100%; padding: 1rem 1rem 1rem 3rem; border: 1px solid #E2E8F0; border-radius: 12px; font-weight: 600;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 1.25rem; font-size: 1.1rem; margin-bottom: 2rem;">
                    <i data-lucide="send" style="width: 18px; margin-right: 10px;"></i> Dispatch Recovery Token
                </button>
            </form>

            <a href="index.html"
                style="color: var(--primary-color); font-weight: 700; font-size: 0.9rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
                Return to Portal Home
            </a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });

        document.getElementById('forgotForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            hg.ui.showToast('Validating identity manifest...', 'info');

            // Simulating API call
            setTimeout(() => {
                hg.ui.showToast('Recovery token dispatched', 'success');
                setTimeout(() => {
                    location.href = 'otp-verification.html';
                }, 1000);
            }, 1500);
        });
    </script>
</body>

</html>
