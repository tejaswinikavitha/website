<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surveillance Notifications - HydroGuard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: #F8FAFC;
            min-height: 100vh;
            display: flex;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            color: #1E293B;
        }

        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 3rem 2rem;
            height: 100vh;
            position: fixed;
            z-index: 100;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 1.5rem;
            border-radius: 20px;
            color: #64748B;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #F0FDFA;
            color: #0D9488;
        }

        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 5rem 6rem;
        }

        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-width: 900px;
        }

        .notification-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid #E2E8F0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            transition: all 0.3s;
            position: relative;
        }

        .notification-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .report-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: #111827;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-new {
            background: #DBEAFE;
            color: #2563EB;
        }

        .status-viewed {
            background: #F3E8FF;
            color: #9333EA;
        }

        .citizen-profile {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .report-photo {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            background: #F3F4F6;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #4B5563;
            font-weight: 600;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-new-report {
            background: #DBEAFE;
            color: #2563EB;
        }

        .status-viewed {
            background: #F3E8FF;
            color: #9333EA;
        }

        .status-pending {
            background: #FFEDD5;
            color: #C2410C;
        }

        .risk-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 900;
            margin-left: 0.5rem;
        }

        .risk-high {
            background: #FEE2E2;
            color: #DC2626;
        }

        .risk-moderate {
            background: #FEF3C7;
            color: #D97706;
        }

        .risk-low {
            background: #D1FAE5;
            color: #059669;
        }

        .btn-view {
            width: 100%;
            background: linear-gradient(135deg, #0D9488 0%, #065F46 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.9rem;
            margin-top: 1.25rem;
            cursor: pointer;
            text-align: center;
            display: block;
            text-decoration: none;
        }

        .timestamp {
            font-size: 0.75rem;
            color: #9CA3AF;
            margin-top: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 4rem;">
            <i data-lucide="shield-plus" style="width: 36px; height: 36px; color: #0D9488;"></i>
            <span style="font-size: 1.5rem; font-weight: 900; color: #0F172A;">HydroGuard</span>
        </div>

        <nav style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
            <a href="healthworker-dashboard.html" class="nav-link">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="healthworker-notifications.html" class="nav-link active">
                <i data-lucide="bell"></i> Notifications
            </a>
            <a href="add-patient-case.html" class="nav-link">
                <i data-lucide="plus-circle"></i> Add Case
            </a>
            <a href="healthworker-profile.html" class="nav-link">
                <i data-lucide="user"></i> Profile
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 4rem; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 3.5rem; font-weight: 950; letter-spacing: -2px; margin: 0; line-height: 1;">
                    SURVEILLANCE<br>ALERT FEED</h1>
                <p style="color: #64748B; font-weight: 700; font-size: 1.1rem; margin-top: 1.5rem;">Citizen reports from
                    your assigned district requiring clinical evaluation.</p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <div class="glass"
                    style="padding: 0.5rem 1.5rem; border-radius: 16px; border: 1px solid #E2E8F0; display: flex; align-items: center; gap: 10px;">
                    <i data-lucide="search" style="width: 18px; color: #94A3B8;"></i>
                    <input type="text" id="notificationSearch" placeholder="Search by name or location..."
                        style="border: none; background: transparent; outline: none; font-weight: 600; color: #1E293B; width: 250px;">
                </div>
                <select id="riskFilter" class="glass"
                    style="padding: 0.5rem 1.5rem; border-radius: 16px; border: 1px solid #E2E8F0; font-weight: 700; color: #1E293B; outline: none;">
                    <option value="all">ALL RISKS</option>
                    <option value="high">HIGH RISK</option>
                    <option value="moderate">MODERATE</option>
                    <option value="low">LOW RISK</option>
                </select>
            </div>
        </header>

        <div class="notification-list" id="notificationList">
            <!-- Loading State -->
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons();
            const list = document.getElementById('notificationList');

            list.innerHTML = `
                <div style="text-align: center; padding: 4rem;">
                    <i data-lucide="loader" class="animate-spin" style="width: 40px; height: 40px; color: #0D9488; margin-bottom: 1rem;"></i>
                    <p style="color: #64748B; font-weight: 700;">SYNCHRONIZING WITH SURVEILLANCE NODE...</p>
                </div>
            `;
            lucide.createIcons();



            const render = (data) => {
                if (data.length === 0) {
                    list.innerHTML = `
                        <div style="background: white; padding: 6rem; border-radius: 40px; text-align: center; border: 1px solid #E2E8F0;">
                            <div style="width: 80px; height: 80px; background: #F0FDFA; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem;">
                                <i data-lucide="info" style="width: 40px; height: 40px; color: #0D9488;"></i>
                            </div>
                            <h3 style="font-size: 1.75rem; font-weight: 950; color: #1E293B; margin-bottom: 1rem;">No matching reports</h3>
                            <p style="color: #64748B; font-weight: 600;">Refine your search or filter to find specific records.</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                list.innerHTML = data.map(report => {
                    const risk = (report.risk_level || 'Low').toLowerCase();
                    const statusClass = (report.status || 'new').toLowerCase().replace(' ', '-');
                    const statusText = report.status || 'NEW REPORT';

                    let imageUrl = null;
                    if (report.photo_url && report.photo_url !== 'image.jpg') {
                        const photo = report.photo_url.trim().replace(/\s/g, "");
                        const isBase64 = photo.startsWith('/9j/') || photo.startsWith('iVBORw') || photo.length > 500;
                        const src = isBase64 ? `data:image/jpeg;base64,${photo}` : `${API_BASE_URL}/uploads/${photo}`;
                        imageUrl = isBase64 && (photo.startsWith('iVBORw') || photo.startsWith('IVBORW')) ? `data:image/png;base64,${photo}` : src;
                    }

                    return `
                        <div class="notification-card">
                            <div class="card-header" style="margin-bottom: 1.25rem;">
                                <div style="font-size: 0.75rem; font-weight: 900; color: #64748B; letter-spacing: 0.05em;">NEW CITIZEN WATER ISSUE REPORT</div>
                                <div class="badge status-${statusClass}">${statusText}</div>
                            </div>
                            
                            <div class="citizen-profile" style="align-items: center;">
                                <div style="flex: 1;">
                                    <h3 style="font-size: 1.4rem; font-weight: 950; margin: 0; color: #1E293B; letter-spacing: -0.5px;">${report.citizen_name}</h3>
                                    <div class="info-row">
                                        <i data-lucide="map-pin" style="width: 14px; color: #0D9488;"></i>
                                        <span>${report.location}</span>
                                    </div>
                                    <div class="info-row">
                                        <i data-lucide="droplet" style="width: 14px; color: #0EA5E9;"></i>
                                        <span>Incident Type: ${report.issue_type}</span>
                                    </div>
                                    <div class="info-row">
                                        <i data-lucide="alert-octagon" style="width: 14px; color: #F43F5E;"></i>
                                        <span>Risk Profile: <span class="risk-badge risk-${risk}">${report.risk_level.toUpperCase()}</span></span>
                                    </div>
                                </div>
                                
                                ${imageUrl ? `
                                    <div style="width: 65px; height: 65px; border-radius: 12px; overflow: hidden; background: #F3F4F6; margin-left:1rem; flex-shrink:0;">
                                        <img src="${imageUrl}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%2394A3B8\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><rect x=\'3\' y=\'3\' width=\'18\' height=\'18\' rx=\'2\' ry=\'2\'/><circle cx=\'8.5\' cy=\'8.5\' r=\'1.5\'/><polyline points=\'21 15 16 10 5 21\'/></svg>'">
                                    </div>
                                ` : `
                                    <div style="width: 65px; height: 65px; border-radius: 12px; background: #F1F5F9; display: flex; align-items: center; justify-content: center; margin-left:1rem; flex-shrink:0;">
                                        <i data-lucide="image" style="color: #94A3B8; width: 24px; height: 24px;"></i>
                                    </div>
                                `}
                            </div>

                            <div class="timestamp" style="border-top: 1px solid #F1F5F9; padding-top: 1rem; margin-top: 1.25rem; font-weight: 700; color: #94A3B8;">
                                <i data-lucide="clock" style="width: 14px; vertical-align: middle; margin-right: 4px;"></i>
                                ${(() => {
                            try {
                                if (!report.reported_at) return 'Just now';
                                const date = new Date(report.reported_at.replace(' ', 'T'));
                                return isNaN(date.getTime()) ? report.reported_at : date.toLocaleString('en-US', {
                                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                                });
                            } catch (e) { return report.reported_at || 'Recently'; }
                        })()}
                            </div>

                            <a href="report-detail.html?id=${report.report_id}" class="btn-view">ANALYZE REPORT &gt;</a>
                        </div>
                    `;
                }).join('');
                lucide.createIcons();
            };

            const user = hg.session.get();
            const response = await hg.api.getNotifications(user ? user.id : null);

            if (response && response.status === 'success' && Array.isArray(response.reports)) {
                const reports = response.reports;

                const filterData = () => {
                    const q = document.getElementById('notificationSearch').value.toLowerCase();
                    const risk = document.getElementById('riskFilter').value;

                    const filtered = reports.filter(r => {
                        const matchesSearch = (r.citizen_name || '').toLowerCase().includes(q) || (r.location || '').toLowerCase().includes(q);
                        const matchesRisk = risk === 'all' || r.risk_level.toLowerCase() === risk;
                        return matchesSearch && matchesRisk;
                    });
                    render(filtered);
                };

                document.getElementById('notificationSearch').addEventListener('input', filterData);
                document.getElementById('riskFilter').addEventListener('change', filterData);

                render(reports);
            } else {
                list.innerHTML = `
                    <div style="background: white; padding: 6rem; border-radius: 40px; text-align: center; border: 1px solid #FCA5A5;">
                        <i data-lucide="wifi-off" style="width: 64px; height: 64px; color: #EF4444; margin-bottom: 2rem;"></i>
                        <h2 style="font-weight: 950; color: #1E293B;">Surveillance Offline</h2>
                        <p style="color: #64748B; font-weight: 600; font-size: 1.2rem;">Could not connect to the remote surveillance node. Ensure your shift credentials are active.</p>
                        <button onclick="window.location.reload()" class="btn-view" style="width: auto; margin: 2rem auto 0; padding: 0.75rem 3rem;">Retry Connection</button>
                    </div>
                `;
                lucide.createIcons();
            }
        });
    </script>
</body>

</html>
