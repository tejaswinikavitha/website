<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification - HydroGuard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .otp-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem;
            margin: 3rem 0;
        }

        .otp-field {
            width: 100%;
            height: 80px;
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            border-radius: 16px;
            border: 2px solid #E2E8F0;
            background: #F8FAFC;
            color: var(--secondary-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .otp-field:focus {
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 4px rgba(8, 145, 178, 0.1);
            outline: none;
            transform: translateY(-2px);
        }
    </style>
</head>

<body style="background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);">
    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <i data-lucide="droplets" class="text-primary" style="width: 32px; height: 32px;"></i>
            <span style="font-size: 1.5rem; font-weight: 700; color: var(--secondary-color);">HydroGuard</span>
        </div>
        <div class="nav-link-group">
            <a href="index.html" class="nav-link">Main Portal</a>
        </div>
        <a href="create-account.html" class="btn btn-primary" style="background: var(--bg-dark);"><i
                data-lucide="user-plus" style="width: 18px; margin-right: 8px;"></i> Sign Up</a>
    </nav>

    <div class="container"
        style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 100px);">
        <div class="card glass text-center" style="max-width: 500px; padding: 4rem 3rem;">
            <div
                style="background: #DEF7FF; color: var(--primary-color); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2.5rem;">
                <i data-lucide="shield-check" style="width: 40px; height: 40px;"></i>
            </div>

            <h2 style="font-size: 2rem; font-weight: 900; color: var(--secondary-color); margin-bottom: 1rem;">Verify
                Identity</h2>
            <p style="color: var(--text-gray); font-weight: 500; line-height: 1.6; margin-bottom: 0;">A unique 4-digit
                synchronization token has been dispatched to your authorized email address.</p>

            <form id="otpForm">
                <div class="otp-grid">
                    <input type="text" class="otp-field" maxlength="1" required autocomplete="off" autofocus>
                    <input type="text" class="otp-field" maxlength="1" required autocomplete="off">
                    <input type="text" class="otp-field" maxlength="1" required autocomplete="off">
                    <input type="text" class="otp-field" maxlength="1" required autocomplete="off">
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 1.25rem; font-size: 1.1rem; margin-bottom: 2.5rem;">
                    <i data-lucide="unlock" style="width: 18px; margin-right: 10px;"></i> Validate Token
                </button>
            </form>

            <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                <p style="color: #94A3B8; font-size: 0.85rem; font-weight: 600;">Didn't receive the transmission?</p>
                <button id="resendBtn"
                    style="background: none; border: none; color: var(--primary-color); font-weight: 800; font-size: 0.9rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; transition: opacity 0.3s;"
                    disabled>
                    <i data-lucide="rotate-ccw" style="width: 16px;"></i> Resend unavailable (<span
                        id="count">30</span>s)
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            startResendTimer();
            setupOTPInputs();
        });

        function setupOTPInputs() {
            const inputs = document.querySelectorAll('.otp-field');
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
        }

        let timeLeft = 30;
        function startResendTimer() {
            const btn = document.getElementById('resendBtn');
            const counter = document.getElementById('count');

            const timer = setInterval(() => {
                timeLeft--;
                counter.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerHTML = '<i data-lucide="rotate-ccw"></i> Resend Mission Token';
                    lucide.createIcons();
                }
            }, 1000);
        }

        document.getElementById('otpForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hg.ui.showToast('Synchronizing token with central ledger...', 'info');

            // Simulating API call
            setTimeout(() => {
                hg.ui.showToast('Identity validated successfully', 'success');
                setTimeout(() => {
                    location.href = 'reset-password.html';
                }, 1000);
            }, 1500);
        });

        document.getElementById('resendBtn').addEventListener('click', function () {
            if (this.disabled) return;
            hg.ui.showToast('Re-transmitting token...', 'info');
            this.disabled = true;
            timeLeft = 30;
            this.innerHTML = '<i data-lucide="rotate-ccw"></i> Resend unavailable (<span id="count">30</span>s)';
            startResendTimer();
        });
    </script>
</body>

</html>
