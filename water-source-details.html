<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source Calibration - HydroGuard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: #F8FAFC;
            min-height: 100vh;
            display: flex;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            color: #1E293B;
        }

        .sidebar {
            width: 300px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            padding: 3rem 2rem;
            height: 100vh;
            position: fixed;
            z-index: 100;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 1.5rem;
            border-radius: 20px;
            color: #64748B;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: #F0FDFA;
            color: #0D9488;
        }

        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 5rem 6rem;
        }

        .form-card {
            background: white;
            border-radius: 40px;
            padding: 4rem;
            border: 1px solid #E2E8F0;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.03);
            max-width: 900px;
            width: 100%;
        }

        .section-label {
            font-size: 0.9rem;
            font-weight: 950;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #0D9488;
            margin-bottom: 2.5rem;
            display: block;
        }

        .field-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-weight: 800;
            font-size: 0.9rem;
            color: #1E293B;
            margin-bottom: 0.75rem;
        }

        .styled-input,
        .styled-select,
        .styled-textarea {
            width: 100%;
            padding: 1.25rem;
            border-radius: 16px;
            border: 2px solid #F1F5F9;
            background: #F8FAFC;
            font-family: inherit;
            font-weight: 600;
            color: #1E293B;
            transition: all 0.3s;
        }

        .styled-input:focus,
        .styled-select:focus {
            border-color: #0D9488;
            outline: none;
            background: white;
        }

        .submit-btn {
            background: #0D9488;
            color: white;
            border: none;
            padding: 1.5rem;
            border-radius: 24px;
            font-weight: 950;
            font-size: 1.1rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 2rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(13, 148, 136, 0.2);
        }

        .step-indicator {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            font-weight: 850;
            font-size: 0.9rem;
            color: #64748B;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #E2E8F0;
        }

        .step-dot.active {
            background: #0D9488;
            box-shadow: 0 0 0 4px #F0FDFA;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 4rem;">
            <i data-lucide="shield-plus" style="width: 36px; height: 36px; color: #0D9488;"></i>
            <span style="font-size: 1.5rem; font-weight: 900; color: #0F172A;">HydroGuard</span>
        </div>

        <nav style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
            <a href="healthworker-dashboard.html" class="nav-link">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <a href="healthworker-notifications.html" class="nav-link">
                <i data-lucide="bell"></i> Notifications
            </a>
            <a href="add-patient-case.html" class="nav-link active">
                <i data-lucide="plus-circle"></i> Add Case
            </a>
            <a href="healthworker-profile.html" class="nav-link">
                <i data-lucide="user"></i> Profile
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 5rem;">
            <div class="step-indicator">
                <span style="color: #64748B;">STAGE 01</span>
                <div class="step-dot active"></div>
                <div class="step-dot active"></div>
                <span style="color: #0D9488;">STAGE 02: ENVIRONMENTAL SCAN</span>
            </div>
            <h1 style="font-size: 4rem; font-weight: 950; letter-spacing: -3px; margin: 0; line-height: 1;">Drinking
                Water<br>Contextualization</h1>
            <p style="color: #64748B; font-weight: 600; font-size: 1.25rem; margin-top: 1.5rem;">Identify the
                hydro-source profile associated with this patient's case.</p>
        </header>

        <div class="form-card">
            <span class="section-label">Source Engineering Profile</span>
            <form id="waterSourceForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem;">
                    <div class="field-group">
                        <label>Hydration Modality (Water Type)</label>
                        <select id="waterType" class="styled-select" required>
                            <option value="">Select Category *</option>
                            <option value="Tap / Piped Water">Tap / Piped Water</option>
                            <option value="Borewell Water">Borewell Water</option>
                            <option value="Hand Pump Water">Hand Pump Water</option>
                            <option value="Well Water">Well Water</option>
                            <option value="River Water">River Water</option>
                            <option value="Lake / Pond Water">Lake / Pond Water</option>
                            <option value="Tanker Water">Tanker Water</option>
                            <option value="Bottled / Packaged Water">Bottled / Packaged Water</option>
                            <option value="Other">Other</option>
                        </select>
                        <input type="text" id="otherWaterType" class="styled-input"
                            placeholder="Specify other water type..." style="display: none; margin-top: 1rem;">
                    </div>

                    <div class="field-group">
                        <label>Infrastructure Interface (Source)</label>
                        <select id="source" class="styled-select" required>
                            <option value="">Select Connection *</option>
                            <option value="Household Connection">Household Connection</option>
                            <option value="Community Tap">Community Tap</option>
                            <option value="Public Hand Pump">Public Hand Pump</option>
                            <option value="Private Borewell">Private Borewell</option>
                            <option value="Public Well">Public Well</option>
                            <option value="River / Lake Source">River / Lake Source</option>
                            <option value="Water Tanker Supply">Water Tanker Supply</option>
                            <option value="Water Vendor">Water Vendor</option>
                            <option value="Other">Other</option>
                        </select>
                        <input type="text" id="otherSource" class="styled-input" placeholder="Specify other source..."
                            style="display: none; margin-top: 1rem;">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem;">
                    <div class="field-group">
                        <label>Visual Manifestation (Appearance)</label>
                        <select id="appearance" class="styled-select" required>
                            <option value="">Select Appearance *</option>
                            <option value="Clear">Clear / Transparent</option>
                            <option value="Slightly Cloudy">Slightly Cloudy</option>
                            <option value="Muddy">Muddy / Sediment</option>
                            <option value="Yellowish">Yellowish / Discolored</option>
                            <option value="Bad Smell">Bad Smell / Odorous</option>
                            <option value="Floating Particles">Floating Particles</option>
                        </select>
                    </div>

                    <div class="field-group">
                        <label>Domestic Treatment (Protocol)</label>
                        <select id="treatment" class="styled-select" required>
                            <option value="">Select Protocol *</option>
                            <option value="Boiling">Boiling</option>
                            <option value="Water Filter">Mechanical Water Filter</option>
                            <option value="Chlorine Tablet">Chemical / Chlorine Tablet</option>
                            <option value="Cloth Filtering">Cloth Filtering</option>
                            <option value="RO Purifier">RO Purifier System</option>
                            <option value="No Treatment">No Treatment Utilized</option>
                        </select>
                    </div>
                </div>

                <div class="field-group">
                    <label>Pathological Observations (Optional)</label>
                    <textarea id="observations" class="styled-textarea"
                        placeholder="Record any environmental anomalies or patient remarks about the water source..."
                        style="height: 120px;"></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">SYNCHRONIZE CASE RECORD <i
                        data-lucide="check-circle"></i></button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();

        const urlParams = new URLSearchParams(window.location.search);
        const caseId = urlParams.get('caseId') || localStorage.getItem('hg_last_case_id');

        if (!caseId) {
            hg.ui.showToast('Sequence Error: Missing Clinical Parent ID', 'error');
            setTimeout(() => window.location.href = 'add-patient-case.html', 2000);
        }

        // Dropdown "Other" Logic
        document.getElementById('waterType').addEventListener('change', function () {
            document.getElementById('otherWaterType').style.display = this.value === 'Other' ? 'block' : 'none';
        });

        document.getElementById('source').addEventListener('change', function () {
            document.getElementById('otherSource').style.display = this.value === 'Other' ? 'block' : 'none';
        });

        document.getElementById('waterSourceForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i data-lucide="loader" class="animate-spin"></i> FINALIZING REPOSITORY SYNC...';
            btn.disabled = true;
            lucide.createIcons();

            let waterType = document.getElementById('waterType').value;
            let source = document.getElementById('source').value;

            if (waterType === 'Other') waterType = document.getElementById('otherWaterType').value;
            if (source === 'Other') source = document.getElementById('otherSource').value;

            // App Logic for Risk Level
            const appearance = document.getElementById('appearance').value;
            let riskLevel = 'low';
            if (appearance === 'Slightly Cloudy') riskLevel = 'moderate';
            else if (['Muddy', 'Yellowish', 'Bad Smell'].includes(appearance)) riskLevel = 'high';

            const data = {
                case_id: caseId,
                water_type: waterType,
                source: source,
                appearance: appearance,
                treatment_method: document.getElementById('treatment').value,
                risk_level: riskLevel
            };

            const response = await hg.api.addWaterSource(data);

            if (response && response.status === 'success') {
                localStorage.removeItem('hg_last_case_id');
                window.location.href = 'healthworker-success.html';
            } else {
                hg.ui.showToast('Data Synchronization Error: ' + (response.message || 'Check storage'), 'error');
                btn.innerHTML = 'SYNCHRONIZE CASE RECORD <i data-lucide="check-circle"></i>';
                btn.disabled = false;
                lucide.createIcons();
            }
        });
    </script>
</body>

</html>
